data:
  processed_dir: "F:/Study/Thesis/Code/data/processed/"
  splits_dir: "F:/Study/Thesis/Code/data/splits/"
  batch_size: 32
  num_workers: 0
  n_channels: 18
  window_samples: 1024

graph:
  metric: "wpli"
  alpha: 1.0
  top_k_percent: 0

model:
  name: "gae"
  encoder_layers: 2
  hidden_dim: 64
  latent_dim: 16

training:
  loss_type: "graph_mse"
  max_epochs: 100
  lr: 0.001
  optimizer: "adam"
  scheduler: "cosine"
  checkpoint_dir: "F:/Study/Thesis/Code/results/checkpoints/"
  log_dir: "F:/Study/Thesis/Code/results/logs/"
  seed: 42

anomaly:
  threshold_percentile: 95

evaluation:
  metrics: ["sensitivity", "specificity", "auroc", "fdr_per_hour"]
  results_log: "F:/Study/Thesis/Code/results/results_log.csv"
