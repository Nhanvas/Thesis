data:
  processed_dir: "../data/processed/"
  splits_dir: "../data/splits/"
  batch_size: 32
  num_workers: 4
  n_channels: 18
  window_samples: 1024

graph:
  metric: "wpli_aec"
  alpha: 0.5
  top_k_percent: 30

model:
  name: "gae"
  encoder_layers: 2
  hidden_dim: 64
  latent_dim: 16

training:
  max_epochs: 100
  lr: 0.001
  optimizer: "adam"
  scheduler: "cosine"
  checkpoint_dir: "../results/checkpoints/"
  log_dir: "../results/logs/"
  seed: 42

anomaly:
  threshold_percentile: 95

evaluation:
  metrics: ["sensitivity", "specificity", "auroc", "fdr_per_hour"]
  results_log: "../results/results_log.csv"